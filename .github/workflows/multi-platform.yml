name: Build and Combine Geode Mod

on:
  push:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            target: Win64
            name: win

          - runner: ubuntu-latest
            target: Android64
            name: android64

          - runner: ubuntu-latest
            target: Android32
            name: android32

          - runner: macos-latest
            target: MacOS
            name: mac

          - runner: macos-latest
            target: iOS
            name: ios

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Mod
        id: build
        uses: geode-sdk/build-geode-mod@main
        with:
          target: ${{ matrix.target }}
          combine: true

      - name: Upload Platform Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ steps.build.outputs.build-output }}

  combine:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download All Platform Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Combine Builds
        id: combine
        uses: geode-sdk/build-geode-mod/combine@main

      - name: Upload Combined Geode
        uses: actions/upload-artifact@v4
        with:
          name: combined-geode
          path: ${{ steps.combine.outputs.build-output }}
